<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Stock Style Analyzer</title>
  <meta name="description" content="Score stocks on Value and Growth, plot them on a 3×3 style box, and compare watchlists.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Style Box">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar"></aside>
    <main id="main"></main>
  </div>
  <div id="modal-overlay"><div id="modal"></div></div>
  <div id="toast-container"></div>
  <script src="scoring.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
  <!-- ttn-backup integration: see https://timtomnow.github.io/ttn-backup/ -->
  <script>
    window.TTNBackupAdapter = {
      appId: 'stock-style-analyzer',
      appName: 'Stock Style Analyzer',
      version: 1,
      exportData: () => state.data,
      importData: (data) => {
        if (!data || typeof data !== 'object') {
          throw new Error('Bundle payload is not an object.');
        }
        state.data = migrateData(data);
        saveData();
        navigate('dashboard');
        showToast('Data restored from ttn-backup', 'success');
      },
    };
  </script>
  <script src="../ttn-backup/client.js" defer></script>
</body>
</html>
